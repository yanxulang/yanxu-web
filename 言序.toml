[包]
格式 = 2
名称 = "yanxu-web"
版本 = "0.2.1"
言序 = ">=1.1.5"
入口 = "src/言序Web.yx"
说明 = "言枢：内建言标模板语言的言序 Web 应用框架"
许可 = "MIT"
作者 = ["言序团队"]

[依赖]
yanxu-html = { git = "https://github.com/yanxulang/yanxu-html.git", 修订 = "main", 版 = "^0.1" }
yanxu-http = { git = "https://github.com/yanxulang/yanxu-http.git", 修订 = "main", 版 = "^0.1" }

[权限]
文件 = ["."]
网络 = []
TCP监听 = ["127.0.0.1", "::1", "localhost"]
