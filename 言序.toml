[包]
格式 = 2
名称 = "yanxu-web"
版本 = "0.2.1"
言序 = ">=1.1.12"
入口 = "src/言序Web.yx"
说明 = "言枢：内建言标模板语言的言序 Web 应用框架"
许可 = "MIT"
作者 = ["言序团队"]

[依赖]
言据 = { git = "https://github.com/yanxulang/yanju.git", 修订 = "v1.2.0", 版 = "^1.2" }
言页 = { git = "https://github.com/yanxulang/yanxu-html.git", 修订 = "v1.0.0", 版 = "^1.0" }
yanxu-http = { git = "https://github.com/yanxulang/yanxu-http.git", 修订 = "v1.0.0", 版 = "^1.0" }
言访 = { git = "https://github.com/yanxulang/yanxu-request.git", 修订 = "v1.0.0", 版 = "^1.0" }

[权限]
文件 = ["."]
网络 = []
TCP监听 = ["127.0.0.1", "::1", "localhost"]
UDP绑定 = []
环境 = []
进程 = false
原生扩展 = false

[导出]
默认 = "src/言序Web.yx"
言标 = "src/言标.yx"
言访测试 = "src/言访测试.yx"

[构建]
目标 = "字节码"
